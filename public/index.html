function toggleT(){const b=document.getElementById('tb');b.style.display=b.style.display==='none'?'block':'none';}

function doLogin(){
  const e=document.getElementById('em').value.trim().toLowerCase();
  if(!e||!e.includes('@')){document.getElementById('er').textContent='Please enter a valid email.';return;}
  user=loadUser(e);showStart();
}
function doTeacher(){
  const c=document.getElementById('tc').value.trim();
  if(c==='TEACHER123')showDash();
  else document.getElementById('er').textContent='Incorrect code.';
}
function doLogout(){user=null;showLogin();}

// ── Start Screen ─────────────────────────────────────────
function showStart(){
  let prog='';
  if(user&&Object.keys(user.stats).length){
    let bars='';
    CATS.forEach(c=>{
      const s=user.stats[c];if(!s||!s.total)return;
      const p=Math.round(s.correct/s.total*100);
      const col=p>=80?C.green:p>=50?C.gold:C.orange;
      bars+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:5px;font-size:12px;color:${C.text}">
        <span style="width:150px;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${c}</span>
        <div style="flex:1;height:10px;background:${C.brown};border-radius:5px;overflow:hidden">
          <div style="height:100%;background:${col};width:${p}%"></div>
        </div>
        <b style="width:34px;color:${col}">${p}%</b>
      </div>`;
    });
    if(bars)prog=`<div style="background:${C.card};border:2px solid ${C.gold};border-radius:8px;padding:14px;margin-bottom:16px;box-shadow:3px 3px 0 ${C.brown}">
      <b style="display:block;margin-bottom:10px;color:${C.brown}">Your Progress</b>${bars}</div>`;
  }
  R(`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:${C.surface};border-radius:6px;margin-bottom:16px;border-bottom:2px solid ${C.gold}">
    <span style="color:${C.gold}">▶ <b>${user.email}</b></span>
    <button onclick="doLogout()" style="font-size:13px;color:${C.orange};background:none;border:none;cursor:inherit;text-decoration:underline;font-family:Georgia,serif">Log out</button>
  </div>
  <div style="display:flex;align-items:center;gap:16px;margin-bottom:16px">
    <div style="width:90px;flex-shrink:0">${MOLE_LANDING}</div>
    <div>
      <h2 style="margin:0 0 6px;color:${C.gold};text-shadow:1px 1px 0 ${C.brown}">Whack-a-Cap! 🔨</h2>
      <p style="color:#1e0e00;font-size:13px;margin:0 0 8px;font-weight:bold">Each sentence has exactly one capitalization error. Click the word that should be capitalized — or shouldn\'t be! The moles will peek out of each hole just before the sentence appears. Each sentence will only appear for a short time. Race the clock and hammer the error before the card turns red and disappears!</p>
      <div style="background:${C.surface};border:1px solid ${C.gold};border-radius:6px;padding:8px 12px;font-size:12px;line-height:1.5;color:#f5e6c8;font-style:italic">
        <b>Tip:</b> Watch the card color — yellow means hurry, orange means faster, red means NOW! Correct answers build your streak and boost your score.
      </div>
    </div>
  </div>
  ${prog}
  <div style="text-align:center">
    <button onclick="startGame()"
      style="padding:14px 40px;font-size:17px;background:linear-gradient(135deg,${C.orange},${C.gold});color:${C.cream};border:none;border-radius:8px;cursor:inherit;font-family:Georgia,serif;font-weight:bold;box-shadow:0 4px 0 ${C.brown},0 5px 12px rgba(0,0,0,0.4)">
      Start Whacking! 🔨
    </button>
  </div>`);
}

// ── Game Shell ───────────────────────────────────────────
async function startGame(){
  score=0;lives=3;streak=0;round=1;running=false;rW=0;rM=0;
  usedMoles=[];spawned=0;active=[];roundMistakes=[];allMistakes=[];activeHoles=START_HOLES;
  CATS.forEach(c=>sesStats[c]={correct:0,total:0});
  renderShell();await countdown(beginRound);
}

function renderShell(){
  R(`<div id="hud" style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px;padding:8px 12px;background:${C.surface};border-radius:6px;font-size:13px;border-bottom:2px solid ${C.gold};color:${C.gold}">
    <span>❤ <span id="h-l">❤❤❤</span></span>
    <span style="color:${C.card}">Score: <b id="h-s" style="color:${C.warnY}">0</b></span>
    <span style="color:${C.card}">Streak: <b id="h-st" style="color:${C.warnY}">0</b> 🔥</span>
    <span style="color:${C.card}">Round <b id="h-r" style="color:${C.warnY}">1</b>/6</span>
    <span id="h-d" style="padding:2px 10px;border-radius:10px;background:${C.green};color:${C.cream};font-weight:bold">Easy</span>
  </div>
  <div id="overlay" style="display:none"></div>
  <div id="grid" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px"></div>`);

  for(let i=0;i<9;i++){
    const d=document.createElement('div');
    d.id='h'+i;
    d.style.cssText=`border:none;border-radius:8px;padding:8px;min-height:180px;background:transparent;font-size:15px;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:all 0.4s`;
    d.innerHTML=`
      <div id="empty${i}" style="display:flex;flex-direction:column;align-items:center;justify-content:center">${EMPTY_HOLE_IMG}</div>
      <div id="peek${i}" style="display:none;flex-direction:column;align-items:center">${PEEK_SVG}<span style="font-size:11px;color:#7a5c3a;margin-top:5px;font-style:italic">Get ready...</span></div>
      <div id="c${i}" style="display:none;width:100%">
        <div id="cat${i}" style="font-size:10px;font-weight:bold;color:#d4621a;text-transform:uppercase;letter-spacing:1px;margin-bottom:7px;border-bottom:1px solid #c9941a;padding-bottom:4px;font-style:italic"></div>
        <div id="s${i}" style="line-height:2.2;color:#1e0e00"></div>
      </div>`;
    document.getElementById('grid').appendChild(d);
  }
}

async function countdown(cb){
  const ov=document.getElementById('overlay');
  ov.style.cssText=`display:block;text-align:center;padding:30px;background:${C.surface};border:3px solid ${C.gold};border-radius:8px;margin-bottom:14px;box-shadow:4px 4px 0 ${C.brown}`;
  for(let i=3;i>=1;i--){
    ov.innerHTML=`<div style="font-size:72px;font-weight:bold;line-height:1;color:${C.gold};text-shadow:3px 3px 0 ${C.brown}">${i}</div>
      <div style="font-size:18px;color:${C.warnO};margin-top:8px;font-style:italic">${i===3?'Get ready!':i===2?'Almost...':'Go! 🔨'}</div>`;
    await sleep(750);
  }
  ov.style.display='none';cb();
}

function pickMole(){
  const avail=MOLES.filter((_,i)=>!usedMoles.includes(i));
  const pool=avail.length?avail:MOLES;
  if(!avail.length)usedMoles=[];
  let chosen;
  if(round>=3&&user&&Object.keys(user.stats).length){
    const weak=CATS.filter(c=>{const s=user.stats[c];return s&&s.total>0&&s.correct/s.total<0.7;});
    const wp=pool.filter(m=>weak.includes(m.cat));
    chosen=wp.length&&Math.random()<(round>=5?.85:.65)?wp[Math.floor(Math.random()*wp.length)]:pool[Math.floor(Math.random()*pool.length)];
  }else chosen=pool[Math.floor(Math.random()*pool.length)];
  usedMoles.push(MOLES.indexOf(chosen));return chosen;
}

function beginRound(){
  running=true;rW=0;rM=0;spawned=0;roundMistakes=[];
  molesTotal=12+round*3;dur=Math.max(27000,33000-round*800);

  // Reset all 9 holes to empty hole image
  for(let i=0;i<9;i++){
    const hEl=document.getElementById('h'+i);
    if(hEl){hEl.style.background='transparent';hEl.style.border='none';hEl.style.alignItems='center';hEl.style.justifyContent='center';}
    showEmpty(i);
  }

  // Pick 5 random holes to start active
  const allIdx=[0,1,2,3,4,5,6,7,8];
  const startSet=allIdx.sort(()=>Math.random()-0.5).slice(0,5);
  startSet.forEach(i=>fillHole(i));

  spawnIv=setInterval(()=>{
    if(spawned>=molesTotal){clearInterval(spawnIv);spawnIv=null;setTimeout(()=>{if(running)endRound();},dur+500);return;}
    // Count active holes (those in 'active' array)
    const activeCount=active.length;
    const needed=5-activeCount;
    if(needed>0){
      // Find holes not currently active
      const freeHoles=[0,1,2,3,4,5,6,7,8].filter(i=>!active.find(a=>a.hi===i));
      const toFill=freeHoles.sort(()=>Math.random()-0.5).slice(0,needed);
      toFill.forEach(i=>fillHole(i));
    }
  },1500);
}


function showEmpty(hi){
  const emptyEl=document.getElementById('empty'+hi);
  const peekEl=document.getElementById('peek'+hi);
  const contentEl=document.getElementById('c'+hi);
  const hEl=document.getElementById('h'+hi);
  if(emptyEl)emptyEl.style.display='flex';
  if(peekEl)peekEl.style.display='none';
  if(contentEl)contentEl.style.display='none';
  if(hEl){hEl.style.background='transparent';hEl.style.border='none';hEl.style.boxShadow='none';hEl.style.alignItems='center';hEl.style.justifyContent='center';}
}
function fillHole(hi){
  if(!running||spawned>=molesTotal)return;
  const m=pickMole();spawned++;
  const hEl=document.getElementById('h'+hi);
  const emptyEl=document.getElementById('empty'+hi);
  const peekEl=document.getElementById('peek'+hi);
  const contentEl=document.getElementById('c'+hi);

  // Show empty hole first (already showing, but reset style)
  if(hEl){hEl.style.background='transparent';hEl.style.border='none';hEl.style.boxShadow='none';}

  const ac={hi,m};

  // After 1.5s show peek mole
  ac.emptyT=setTimeout(()=>{
    if(!active.includes(ac))return;
    if(emptyEl)emptyEl.style.display='none';
    if(peekEl)peekEl.style.display='flex';
  },1500);

  // After 1.5s + 3s (PEEK_DELAY) reveal sentence
  ac.peekT=setTimeout(()=>{
    if(!active.includes(ac))return;
    if(peekEl)peekEl.style.display='none';
    if(hEl){hEl.style.background=C.card;hEl.style.border=`2px solid ${C.gold}`;hEl.style.boxShadow=`3px 3px 0 ${C.brown}`;hEl.style.alignItems='flex-start';hEl.style.justifyContent='flex-start';}
    document.getElementById('cat'+hi).textContent=m.cat;
    const sentEl=document.getElementById('s'+hi);sentEl.innerHTML='';
    // Detect title words for italics
    let titleStart=-1;
    const titleTriggers=['novel','poem','song','play','book','series','assigned','read','borrowed','listening','studied','analyzed','titled','called'];
    if(m.cat==='Titles'){
      for(let ti=0;ti<m.words.length;ti++){
        const wl=m.words[ti].toLowerCase().replace(/[^a-z]/g,'');
        if(titleTriggers.includes(wl)){titleStart=ti+1;break;}
      }
      if(titleStart===-1) titleStart=0;
    }
    m.words.forEach((w,i)=>{
      const sp=document.createElement('span');
      sp.textContent=w+' ';
      const isTitle=m.cat==='Titles'&&titleStart>=0&&i>=titleStart;
      sp.style.cssText=`cursor:inherit;padding:2px 4px;border-radius:3px;display:inline;font-family:Georgia,serif${isTitle?';font-style:italic':''}`;
      sp.onmouseover=()=>{if(!sp.dataset.done){sp.style.background='#fde047';sp.style.borderRadius='4px';sp.style.boxShadow='0 2px 0 #ca8a04';sp.style.fontWeight='bold';}};
      sp.onmouseout=()=>{if(!sp.dataset.done){sp.style.background='';sp.style.boxShadow='';sp.style.fontWeight='';}};
      sp.onclick=()=>onWord(i,m,hi,sp);
      sentEl.appendChild(sp);
    });
    if(contentEl)contentEl.style.display='block';
    const rem=dur-PEEK_DELAY-1500;
    ac.tY=setTimeout(()=>{if(active.includes(ac)){hEl.style.background=C.warnY;hEl.style.border=`2px solid ${C.gold}`;}},Math.max(0,rem-11000));
    ac.tO=setTimeout(()=>{if(active.includes(ac)){hEl.style.background=C.warnO;hEl.style.border=`2px solid ${C.orange}`;}},Math.max(0,rem-8000));
    ac.tR=setTimeout(()=>{if(active.includes(ac)){hEl.style.background=C.warnR;hEl.style.border=`2px solid ${C.brown}`;}},Math.max(0,rem-5000));
  },1500+PEEK_DELAY);

  ac.ht=setTimeout(()=>escape(hi,ac),dur);
  active.push(ac);
}

function onWord(idx,m,hi,sp){
  const ac=active.find(a=>a.hi===hi);if(!ac)return;
  const sentEl=document.getElementById('s'+hi);
  const spans=[...sentEl.querySelectorAll('span')];
  spans.forEach(s=>{s.onclick=null;s.style.cursor='inherit';s.dataset.done='1';});
  const right=m.err.includes(idx);
  const cat=m.cat;
  if(!sesStats[cat])sesStats[cat]={correct:0,total:0};sesStats[cat].total++;
  const hEl=document.getElementById('h'+hi);
  if(right){
    sesStats[cat].correct++;const pts=10+Math.min(streak*3,25);score+=pts;streak++;rW++;
    m.err.forEach((ei,j)=>{if(spans[ei]){spans[ei].style.background='#dcfce7';spans[ei].style.color='#14532d';spans[ei].style.fontWeight='bold';spans[ei].textContent=m.fix[j]+' ';}});
    hEl.style.background='#22c55e';hEl.style.border='3px solid #15803d';hEl.style.boxShadow='3px 3px 0 #14532d';
    clearAc(ac);
    
    setTimeout(()=>clearHole(hi,ac),700);
  }else{
    lives--;streak=0;rM++;
    const correct=m.words.map((w,i)=>{const ei=m.err.indexOf(i);return ei>=0?m.fix[ei]:w;}).join(' ');
    roundMistakes.push({original:m.words.join(' '),correct,wrongClicked:m.words[idx],errWords:m.err.map(i=>m.words[i]),fixWords:m.fix,explain:m.explain,cat:m.cat,round});
    allMistakes.push(roundMistakes[roundMistakes.length-1]);
    sp.style.background='#fca5a5';sp.style.color='#7f1d1d';sp.style.fontWeight='bold';
    hEl.style.background='#ef4444';hEl.style.border='3px solid #991b1b';
    if(lives<=0){stopGame();setTimeout(endGame,600);return;}
    setTimeout(()=>{
      m.err.forEach(ei=>{if(spans[ei]){spans[ei].style.background='#fef9c3';spans[ei].style.color='#7f1d1d';spans[ei].style.fontWeight='bold';}});
      setTimeout(()=>clearHole(hi,ac),1500);
    },600);
  }
  updateHUD();
}

function clearAc(ac){clearTimeout(ac.emptyT);clearTimeout(ac.peekT);clearTimeout(ac.ht);clearTimeout(ac.tY);clearTimeout(ac.tO);clearTimeout(ac.tR);}
function escape(hi,ac){if(!active.includes(ac))return;streak=0;rM++;updateHUD();clearAc(ac);clearHole(hi,ac);}
function clearHole(hi,ac){
  clearAc(ac);active=active.filter(a=>a!==ac);
  showEmpty(hi);
  // Refill this hole after a short delay to maintain 5 active
  if(running&&spawned<molesTotal){
    setTimeout(()=>{
      if(running&&!active.find(a=>a.hi===hi)&&active.length<5)fillHole(hi);
    },800);
  }
}
function stopGame(){running=false;if(spawnIv){clearInterval(spawnIv);spawnIv=null;}active.forEach(ac=>clearAc(ac));active=[];}

function mistakeCards(list){
  if(!list.length)return`<p style="color:${C.green};font-weight:bold">✓ No mistakes!</p>`;
  return list.map(m=>`<div style="background:${C.card};border:2px solid ${C.gold};border-radius:8px;padding:14px;margin-bottom:10px;box-shadow:2px 2px 0 ${C.brown}">
    <div style="font-size:10px;font-weight:bold;color:${C.orange};text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;font-style:italic">${m.cat}</div>
    <div style="font-size:12px;color:${C.muted};margin-bottom:4px">You clicked: <b style="color:${C.orange}">"${m.wrongClicked}"</b></div>
    <div style="background:${C.cardAlt};border-radius:4px;padding:8px 10px;font-size:13px;margin-bottom:8px;line-height:1.7;color:${C.text}">${m.correct}</div>
    <div style="font-size:12px;color:${C.muted};margin-bottom:8px">Error: ${m.errWords.map((w,i)=>`<span style="text-decoration:line-through;color:${C.orange}">${w}</span> → <b style="color:${C.green}">${m.fixWords[i]}</b>`).join(', ')}</div>
    <div style="background:${C.surface};border-left:4px solid ${C.orange};padding:8px 12px;font-size:13px;line-height:1.6;color:${C.warnY};font-style:italic"><b style="color:${C.gold}">Why?</b> ${m.explain}</div>
  </div>`).join('');
}

function endRound(){
  if(!running)return;running=false;
  [...active].forEach(ac=>{clearAc(ac);clearHole(ac.hi,ac);});active=[];
  const tot=rW+rM;
  const ov=document.getElementById('overlay');
  ov.style.cssText=`display:block;padding:20px;background:${C.surface};border:3px solid ${C.gold};border-radius:8px;margin-bottom:14px;box-shadow:4px 4px 0 ${C.brown}`;
  const subs=["Keep on truckin'!","Getting groovy!","Right on, halfway there!","Far out, great work!","One more, can you dig it?","Done, daddy-o!"];
  const roundAcc=tot?Math.round(rW/tot*100):0;
  const roundMoleImg=roundAcc<50?MOLE_NERVOUS:roundAcc<=75?MOLE_HMM:roundAcc<=90?MOLE_RESULTS:MOLE_CELEBRATE;
  ov.innerHTML=`<div style="text-align:center;margin-bottom:16px">
    <div style="width:100px;margin:0 auto 10px">${roundMoleImg}</div>
    <h3 style="margin-bottom:4px;color:${C.gold}">Round ${round} Complete! 🎉</h3>
    <p style="color:${C.warnO};margin-bottom:14px;font-style:italic">${subs[Math.min(round-1,5)]}</p>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;max-width:260px;margin:0 auto">
      <div style="background:${C.card};border:2px solid ${C.gold};border-radius:6px;padding:10px;box-shadow:2px 2px 0 ${C.brown}"><div style="font-size:10px;color:${C.muted};text-transform:uppercase">Whacked</div><div style="font-size:24px;font-weight:bold;color:${C.green}">${rW}</div></div>
      <div style="background:${C.card};border:2px solid ${C.gold};border-radius:6px;padding:10px;box-shadow:2px 2px 0 ${C.brown}"><div style="font-size:10px;color:${C.muted};text-transform:uppercase">Missed</div><div style="font-size:24px;font-weight:bold;color:${C.orange}">${rM}</div></div>
      <div style="background:${C.card};border:2px solid ${C.gold};border-radius:6px;padding:10px;box-shadow:2px 2px 0 ${C.brown}"><div style="font-size:10px;color:${C.muted};text-transform:uppercase">Score</div><div style="font-size:24px;font-weight:bold;color:${C.text}">${score}</div></div>
      <div style="background:${C.card};border:2px solid ${C.gold};border-radius:6px;padding:10px;box-shadow:2px 2px 0 ${C.brown}"><div style="font-size:10px;color:${C.muted};text-transform:uppercase">Accuracy</div><div style="font-size:24px;font-weight:bold;color:${C.text}">${tot?Math.round(rW/tot*100)+'%':'—'}</div></div>
    </div>
  </div>
  ${roundMistakes.length
    ?`<div style="border-top:2px solid ${C.gold};padding-top:16px;margin-bottom:16px"><b style="font-size:14px;color:${C.gold}">📝 This Round's Mistakes (${roundMistakes.length})</b><p style="font-size:12px;color:${C.muted};margin:4px 0 12px;font-style:italic">Sentences you clicked incorrectly:</p>${mistakeCards(roundMistakes)}</div>`
    :`<div style="border-top:2px solid ${C.gold};padding-top:16px;margin-bottom:16px;text-align:center;color:${C.green};font-weight:bold">✓ Perfect round — groovy!</div>`}
  <div style="text-align:center;display:flex;flex-direction:column;align-items:center;gap:10px">
    <button onclick="nextRound()" style="padding:12px 30px;font-size:15px;background:linear-gradient(135deg,${C.orange},${C.gold});color:${C.cream};border:none;border-radius:8px;cursor:inherit;font-family:Georgia,serif;box-shadow:0 3px 0 ${C.brown};min-width:210px">
      ${round<6?'Next Round →':'See Final Report →'}
    </button>
    ${round<6?'<button onclick="endGame()" style="padding:10px 30px;font-size:13px;background:#3d2610;color:#c9941a;border:2px solid #c9941a;border-radius:8px;cursor:inherit;font-family:Georgia,serif;min-width:210px">Skip to Final Results</button>':''}
  </div>`;
  document.getElementById('grid').style.display='none';
}

async function nextRound(){
  document.getElementById('overlay').style.display='none';
  document.getElementById('grid').style.display='grid';
  round++;rW=0;rM=0;roundMistakes=[];activeHoles=START_HOLES;
  if(round>6){endGame();return;}
  updateHUD();await countdown(beginRound);
}

async function endGame(){
  stopGame();
  if(user){
    CATS.forEach(c=>{const ss=sesStats[c];if(!ss||!ss.total)return;if(!user.stats[c])user.stats[c]={correct:0,total:0};user.stats[c].correct+=ss.correct;user.stats[c].total+=ss.total;});
    user.games=(user.games||0)+1;if(score>=(user.best||0))user.best=score;saveUser(user);
  }
  let grid='',wc=null,wp=101;
  CATS.forEach(c=>{
    const ss=sesStats[c];if(!ss||!ss.total)return;
    const p=Math.round(ss.correct/ss.total*100);
    const col=p>=80?C.green:p>=50?C.gold:C.orange;
    const bg=p>=80?'#d8edac':p>=50?C.warnY:'#f0c0a0';
    grid+=`<div style="background:${bg};border:2px solid ${col};border-radius:6px;padding:10px;box-shadow:2px 2px 0 ${C.brown}"><div style="font-size:10px;color:${C.brown};font-style:italic">${c}</div><div style="font-size:20px;font-weight:bold;color:${C.brown}">${p}%</div><div style="font-size:10px;color:${C.brown}">${p>=80?"✓ Solid":p>=50?"~ Comin' along":"✗ Keep at it"}</div></div>`;
    if(p<wp){wp=p;wc=c;}
  });
  const focus=wc&&wp<80?`<div style="background:${C.surface};border:2px solid ${C.gold};border-radius:6px;padding:12px;margin-bottom:14px;font-size:13px;line-height:1.6;color:${C.warnY};box-shadow:3px 3px 0 ${C.brown}"><b style="color:${C.gold}">📌 Focus Area: ${wc}</b><br/><span style="font-style:italic">${CAT_TIPS[wc]}</span></div>`:'';
  const mistakeSec=allMistakes.length
    ?`<div style="border-top:2px solid ${C.gold};padding-top:16px;margin-top:4px"><h3 style="margin-bottom:4px;color:${C.gold}">📝 Sentences to Review (${allMistakes.length})</h3><p style="font-size:13px;color:${C.muted};margin-bottom:14px;font-style:italic">Study the correction and the rule!</p>${mistakeCards(allMistakes)}</div>`
    :`<div style="border-top:2px solid ${C.gold};padding-top:16px;margin-top:4px;text-align:center"><p style="color:${C.green};font-weight:bold;font-size:15px">🏆 Perfect game — far out!</p></div>`;
  const perfect=allMistakes.length===0;
  const finalAcc=allMistakes.length?(Math.round(((molesTotal-allMistakes.length)/molesTotal)*100)):100;
  const finalMoleImg=finalAcc<50?MOLE_NERVOUS:finalAcc<=75?MOLE_HMM:finalAcc<=90?MOLE_RESULTS:MOLE_CELEBRATE;
  const msg=perfect?"Cap the Mole is impressed — outta sight!":score>300?"Cap the Mole says: right on!":"Cap the Mole says: keep on truckin'!";
  R(`<div style="text-align:center;margin-bottom:16px">
    <div style="width:${perfect?130:110}px;margin:0 auto 10px">${finalMoleImg}</div>
    <h2 style="margin:0 0 4px;color:${C.gold};text-shadow:2px 2px 0 ${C.brown}">Final Report Card 📋</h2>
    <p style="color:${C.warnO};font-size:14px;margin:0 0 4px;font-style:italic">${msg}</p>
    <p style="color:${C.card};font-size:13px;margin:0 0 16px">Score: <b style="color:${C.gold}">${score}</b> — ${Math.min(round-1,6)}/6 rounds</p>
  </div>
  <h3 style="margin-bottom:8px;color:${C.gold}">Rule Breakdown</h3>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">${grid}</div>
  ${focus}${mistakeSec}
  <div style="display:flex;gap:8px;margin-top:16px">
    <button onclick="startGame()" style="flex:1;padding:12px;font-size:14px;background:linear-gradient(135deg,${C.orange},${C.gold});color:${C.cream};border:none;border-radius:8px;cursor:inherit;font-family:Georgia,serif;box-shadow:0 3px 0 ${C.brown}">Play Again</button>
    <button onclick="showStart()" style="flex:1;padding:12px;font-size:14px;background:${C.surface};color:${C.gold};border:2px solid ${C.gold};border-radius:8px;cursor:inherit;font-family:Georgia,serif">Home</button>
  </div>`);
}

function updateHUD(){
  const hl=document.getElementById('h-l');if(hl)hl.textContent='❤'.repeat(Math.max(0,lives))+'🖤'.repeat(Math.max(0,3-lives));
  const hs=document.getElementById('h-s');if(hs)hs.textContent=score;
  const hst=document.getElementById('h-st');if(hst)hst.textContent=streak;
  const hr=document.getElementById('h-r');if(hr)hr.textContent=round;
  const hd=document.getElementById('h-d');
  if(hd){const lvl=round<=2?'Easy':round<=4?'Medium':'Hard';const bg=round<=2?C.green:round<=4?C.gold:C.orange;hd.textContent=lvl;hd.style.background=bg;}
}

  </div>
  ${us.length
    ?`<div style="overflow-x:auto"><table style="border-collapse:collapse;width:100%;font-size:12px;font-family:Georgia,serif"><thead style="background:${C.brown}"><tr>${heads}</tr></thead><tbody>${rows}</tbody></table></div>`
    :`<p style="color:${C.muted};padding:20px 0;font-style:italic">No student data yet.</p>`}`);
}

// ── Boot ─────────────────────────────────────────────────
showLogin();
</script>
</body>
</html>
